title Arch Linux (Zen)
linux /vmlinuz-linux-zen
initrd /amd-ucode.img
initrd /initramfs-linux-zen.img
options root=UUID="" rw quiet acpi_apic_instance=2 acpi_enforce_resources=strict acpi_osi=!! add_efi_memmap align_va_addr=on amd_iommu=pgtbl_v2 amd_pstate=guided amd_iommu_intr=legacy apicpmtimer apic_extnmi=all apparmor=1 audit=0 audit_backlog_limit=16384 cgroup_no_v1=all cgroup_v1_proc=false clocksource=acpi_pm,hpet,tsc cpuidle.governor=teo cpufreq.default_governor=ondemand edac_report=on enforcing=0 iomem=strict iommu=nopt iommu.strict=1 iommu.passthrough=0 ipcmni_extend nf_conntrack.acct=1 pci=check_enable_amd_mmconf,ioapicreroute,use_crs,use_e820,routeirq,ecrc=on,realloc=on,pcie_scan_all,big_root_window pcie_ports=native psi=1 trusted.rng=tpm selinux=0 lsm=landlock,apparmor,selinux,yama,integrity tsc=watchdog trace_clock=local