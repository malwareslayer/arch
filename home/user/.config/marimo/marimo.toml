[ai]
rules = ""

[ai.anthropic]

[ai.google]

[ai.open_ai]

[runtime]
auto_reload = "autorun"
on_cell_change = "autorun"
auto_instantiate = true
auto_reload = "off"

[experimental]
chat_sidebar = false
tracing = true
multi_column = true

[save]
autosave = "after_delay"
format_on_save = false
autosave_delay = 1000

[snippets]
include_default_snippets = true
custom_paths = []

[formatting]
line_length = 120

[completion]
activate_on_typing = true
copilot = false

[package_management]
manager = "pip"

[keymap]
preset = "default"
[keymap.overrides]

[server]
follow_symlink = false
browser = "default"

[display]
cell_output = "above"
theme = "light"
code_editor_font_size = 14
default_width = "medium"
dataframes = "rich"
default_width = "medium"
code_editor_font_size = 14
theme = "light"
cell_output = "above"
